<!DOCTYPE html>
<html>
<head>
<title>Ecommerce World</title>

<style>
body { font-family: Arial; margin:0; background:#f1f3f6; }

.center {
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    background: linear-gradient(135deg,#2874f0,#6dd5fa);
}

.auth-box {
    background:white; padding:30px; border-radius:10px;
    width:300px; text-align:center;
}

input { padding:10px; margin:8px; width:90%; }

button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }

.primary { background:#2874f0; color:white; width:100%; }
.success { background:green; color:white; width:100%; }
.danger { background:red; color:white; }

.header {
    background:#2874f0; color:white;
    padding:15px; display:flex; justify-content:space-between;
}

/* GRID */
#products {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    padding:20px;
}

/* 🔥 FINAL CARD FIX */
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    height:300px; /* fixed */
}

/* IMAGE */
.card img {
    width:100%;
    height:120px;
    object-fit:contain;
}

/* TITLE */
.card h3 {
    margin:5px 0;
    font-size:16px;
}

/* PRICE */
.price {
    color:green;
    font-weight:bold;
}

/* 🔥 MAIN FIX (ALWAYS VISIBLE) */
.qty {
    margin-top:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.qty button {
    background:#2874f0;
    color:white;
    width:30px;
    height:30px;
    font-size:16px;
    padding:0;
}

/* CART BAR */
.cart-bar {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    text-align:center;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let total = 0;

showAuth();

/* -------- FIRST PAGE -------- */

function showAuth(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Ecommerce World</h2>
            <button class="primary" onclick="showLogin()">Login</button><br><br>
            <button class="success" onclick="showSignup()">Signup</button>
        </div>
    </div>`;
}

/* -------- SIGNUP -------- */

function showSignup(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Signup</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="success" onclick="signup()">Next</button>
        </div>
    </div>`;
}

function signup(){
    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    if(!email || !password){
        alert("All fields required!");
        return;
    }

    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPassword", password);

    showDetails();
}

/* -------- DETAILS -------- */

function showDetails(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>User Details</h2>
            <input id="name" placeholder="Name">
            <input id="phone" placeholder="Phone">
            <input id="address" placeholder="Address">
            <button class="success" onclick="saveDetails()">Continue</button>
        </div>
    </div>`;
}

function saveDetails(){
    let name = document.getElementById('name').value.trim();
    let phone = document.getElementById('phone').value.trim();
    let address = document.getElementById('address').value.trim();

    if(!name || !phone || !address){
        alert("All fields required!");
        return;
    }

    localStorage.setItem("userDetails", JSON.stringify({name,phone,address}));

    showProducts();
}

/* -------- LOGIN -------- */

function showLogin(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Login</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="primary" onclick="login()">Login</button>
        </div>
    </div>`;
}

function login(){
    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    let savedEmail = localStorage.getItem("userEmail");
    let savedPassword = localStorage.getItem("userPassword");

    if(!email || !password){
        alert("Enter all fields!");
        return;
    }

    if(email === savedEmail && password === savedPassword){
        showProducts();
    } else {
        alert("Invalid credentials!");
    }
}

/* -------- PRODUCTS -------- */

function calculateTotal(){
    total = 0;
    for(let id in cart){
        total += cart[id].price * cart[id].qty;
    }
}

function showProducts(){

    document.getElementById('app').innerHTML = `
        <div class="header">
            <h2>Ecommerce World</h2>
            <button class="danger" onclick="logout()">Logout</button>
        </div>

        <div id="products"></div>

        <div class="cart-bar">
            Total: ₹<span id="total">0</span>
            <button class="primary" onclick="goToCart()">View Cart</button>
        </div>
    `;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {

        let container = document.getElementById('products');

        data.forEach(item => {

            let id = item.id;
            let name = item.name;
            let price = item.price;

            let qty = cart[id] ? cart[id].qty : 0;
            let image = "/images/" + name.toLowerCase() + ".jpg";

            let div = document.createElement('div');
            div.className = "card";

            div.innerHTML = `
                <img src="${image}" onerror="this.src='/images/default.jpg'">
                <h3>${name}</h3>
                <p class="price">₹${price}</p>

                <div class="qty">
                    <button onclick="decrease('${id}')">-</button>
                    <span>${qty}</span>
                    <button onclick="increase('${id}','${name}',${price})">+</button>
                </div>
            `;

            container.appendChild(div);
        });

        calculateTotal();
        document.getElementById('total').innerText = total;
    });
}

/* -------- CART -------- */

function increase(id,name,price){
    if(!cart[id]) cart[id] = {name,price,qty:0};
    cart[id].qty++;
    localStorage.setItem("cart", JSON.stringify(cart));
    showProducts();
}

function decrease(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty <= 0) delete cart[id];
        localStorage.setItem("cart", JSON.stringify(cart));
        showProducts();
    }
}

/* -------- CART PAGE -------- */

function goToCart(){

    let total = 0;
    let bill = "";

    for(let id in cart){
        let item = cart[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        bill += `${item.name} (${item.qty}) = ₹${itemTotal}<br>`;
    }

    document.getElementById('app').innerHTML = `
        <div class="header">
            <h2>Cart</h2>
            <button class="danger" onclick="showProducts()">Back</button>
        </div>

        <div style="padding:20px;">
            ${bill}
            <hr>
            <h3>Total Amount = ₹${total}</h3>
            <hr>
            <button class="success" onclick="placeOrder()">Place Order</button>
        </div>
    `;
}

/* -------- PLACE ORDER -------- */

function placeOrder(){

    fetch('/api/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({cart})
    })
    .then(() => {
        alert("✅ Order placed successfully!");

        cart = {};
        localStorage.removeItem("cart");

        showProducts();
    });
}

/* -------- LOGOUT -------- */

function logout(){
    localStorage.clear();
    location.reload();
}

</script>
</body>
</html>
