<!DOCTYPE html>
<html>
<head>
<title>Daily Mart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f1f3f6; }

.center {
    display:flex; justify-content:center; align-items:center;
    height:100vh; background:linear-gradient(135deg,#2874f0,#6dd5fa);
}

.auth-box {
    background:white; padding:30px; border-radius:10px;
    width:320px; text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input {
    padding:10px; margin:8px; width:90%;
    border:1px solid #ccc; border-radius:5px;
}

button {
    padding:10px; border:none; border-radius:5px;
    cursor:pointer; margin-top:10px;
}

.primary { background:#2874f0; color:white; width:100%; }
.success { background:green; color:white; width:100%; }
.danger { background:red; color:white; }

.header {
    background:#2874f0; color:white;
    padding:15px; display:flex;
    justify-content:space-between; align-items:center;
}

#products {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px; padding:20px;
}

.card {
    background:white; padding:15px;
    border-radius:10px; text-align:center;
}

.card img {
    width:100%; height:160px;
    object-fit:cover;
}

.price { color:green; font-weight:bold; }

.qty {
    display:flex; justify-content:center;
    gap:10px; margin-top:10px;
}

.qty button {
    background:#2874f0; color:white;
}

.cart-bar {
    position:fixed; bottom:0;
    width:100%; background:white;
    padding:15px; text-align:center;
}

.cart-btn { background:#ff9800; color:white; }

.table-row {
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let total = 0;

showAuth();

/* ================= AUTH ================= */

function showAuth(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Daily Mart</h2>
            <button class="primary" onclick="showLogin()">Login</button>
            <button class="success" onclick="showSignup()">Signup</button>
        </div>
    </div>`;
}

function showSignup(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Signup</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="success" onclick="signup()">Signup</button>
        </div>
    </div>`;
}

function signup(){
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(!email || !pass) return alert("Fill all fields");

    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPassword", pass);

    showDetails();
}

function showDetails(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Details</h2>
            <input id="name" placeholder="Name">
            <input id="phone" placeholder="Phone">
            <input id="address" placeholder="Address">
            <button class="success" onclick="saveDetails()">Continue</button>
        </div>
    </div>`;
}

function saveDetails(){
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();

    if(!name || !phone || !address) return alert("Fill all details");

    localStorage.setItem("details", JSON.stringify({name,phone,address}));

    showProducts();
}

function showLogin(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Login</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="primary" onclick="login()">Login</button>
        </div>
    </div>`;
}

function login(){
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();

    if(email === localStorage.getItem("userEmail") &&
       pass === localStorage.getItem("userPassword")){
        showProducts();
    } else {
        alert("Invalid login");
    }
}

/* ================= PRODUCTS ================= */

function showProducts(){
    document.getElementById('app').innerHTML = `
    <div class="header">
        <h2>Daily Mart</h2>
        <button class="danger" onclick="logout()">Logout</button>
    </div>

    <div id="products"></div>

    <div class="cart-bar">
        Total: ₹<span id="total">0</span>
        <button class="cart-btn" onclick="goToCart()">View Cart</button>
    </div>`;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => renderProducts(data));
}

function renderProducts(data){
    let container = document.getElementById('products');
    container.innerHTML = "";

    data.forEach(item=>{
        let qty = cart[item.id]?.qty || 0;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <img src="/images/${item.image}">
        <h3>${item.name}</h3>
        <p class="price">₹${item.price}</p>

        <div class="qty">
            <button onclick="dec('${item.id}')">-</button>
            <span id="q-${item.id}">${qty}</span>
            <button onclick="inc('${item.id}','${item.name}',${item.price})">+</button>
        </div>`;

        container.appendChild(div);
    });

    updateTotal();
}

/* ================= CART ================= */

function inc(id,name,price){
    if(!cart[id]) cart[id]={name,price,qty:0};
    cart[id].qty++;

    saveCart();
}

function dec(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty<=0) delete cart[id];
        saveCart();
    }
}

/* ✅ FIXED (NO PAGE RELOAD / NO PRODUCT RESET) */
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));

    for(let id in cart){
        let el = document.getElementById(`q-${id}`);
        if(el) el.innerText = cart[id].qty;
    }

    updateTotal();
}

function updateTotal(){
    let t = 0;

    for(let id in cart){
        t += cart[id].price * cart[id].qty;
    }

    let el = document.getElementById("total");
    if(el) el.innerText = t;
}

/* ================= CART PAGE ================= */

function goToCart(){
    let html = `
    <div class="header">
        <h2>Cart</h2>
        <button onclick="showProducts()">Back</button>
    </div><div style="padding:20px">`;

    let total = 0;

    for(let id in cart){
        let i = cart[id];
        let t = i.price * i.qty;
        total += t;

        html += `
        <div class="table-row">
            <span>${i.name}</span>
            <span>${i.qty}</span>
            <span>₹${t}</span>
        </div>`;
    }

    html += `
    <hr>
    <h3>Total ₹${total}</h3>
    <button class="success" onclick="placeOrder()">Place Order</button>
    </div>`;

    document.getElementById("app").innerHTML = html;
}

/* ================= ORDER + POPUP ================= */

function placeOrder(){

    let cartCopy = JSON.parse(JSON.stringify(cart));

    fetch("/api/order",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            cart:cartCopy,
            user:JSON.parse(localStorage.getItem("details"))
        })
    })
    .then(()=>{

        alert("Order Placed!");

        showBillPopup(cartCopy);

        localStorage.removeItem("cart");
        cart={};

    });
}

/* POPUP */
function showBillPopup(billCart){

    let popup = document.createElement("div");
    popup.style = `
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.6);display:flex;
    justify-content:center;align-items:center`;

    popup.innerHTML = `
    <div style="background:white;padding:20px;border-radius:10px;text-align:center">
        <h3>Bill Ready</h3>
        <p>Download your bill?</p>

        <button onclick='downloadPDF(${JSON.stringify(billCart)})'
        style="background:green;color:white;padding:10px;margin:5px">
        Download PDF</button>

        <button onclick="this.parentElement.parentElement.remove()"
        style="background:red;color:white;padding:10px;margin:5px">
        Cancel</button>
    </div>`;

    document.body.appendChild(popup);
}

/* ================= PDF ================= */

function downloadPDF(cart){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 10;
    let total = 0;

    doc.text("DAILY MART INVOICE",10,y);
    y += 10;

    for(let id in cart){
        let i = cart[id];
        let t = i.price * i.qty;
        total += t;

        doc.text(`${i.name} Qty:${i.qty} ₹${t}`,10,y);
        y += 10;
    }

    doc.text("-------------------",10,y);
    y += 10;
    doc.text("TOTAL ₹"+total,10,y);

    doc.save("bill.pdf");
}

/* ================= LOGOUT ================= */

function logout(){
    localStorage.clear();
    location.reload();
}

</script>
</body>
