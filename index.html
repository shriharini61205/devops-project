<!DOCTYPE html>
<html>
<head>
    <title> E-commerce App</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .product {
            background: white;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>🛒 My Products</h1>
<div id="products"></div>

<script>
fetch('/api/products')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('products');
    data.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `<h3>${p.name}</h3>`;
        container.appendChild(div);
    });
});
</script>

</body>
</html>
