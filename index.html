<!DOCTYPE html> <html> <head> <title>My Store</title> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <style> body { font-family: Arial; margin: 0; background: #f1f3f6; padding-bottom: 80px; } .center { display:flex; justify-content:center; align-items:center; height:100vh; background: linear-gradient(135deg,#2874f0,#6dd5fa); } .auth-box { background:white; padding:30px; border-radius:10px; width:300px; text-align:center; } input { padding:10px; margin:8px; width:90%; } button { padding:8px; border:none; border-radius:5px; cursor:pointer; } .primary { background:#2874f0; color:white; width:100%; } .success { background:green; color:white; width:100%; } .danger { background:red; color:white; } .header { background:#2874f0; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; } #products { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; padding: 20px; } .card { background:white; padding:15px; border-radius:10px; text-align:center; } .card img { width:100%; height:140px; object-fit:cover; } .price { color:green; font-weight:bold; } .qty { display:flex; justify-content:center; gap:10px; margin-top:10px; } .qty button { background:#2874f0; color:white; } .cart-bar { position:fixed; bottom:0; width:100%; background:white; padding:15px; text-align:center; box-shadow:0 -2px 8px rgba(0,0,0,0.1); } </style> </head> <body> <div id="app"></div> <script> let cart = JSON.parse(localStorage.getItem("cart")) || {}; let total = 0; let allProducts = []; showAuth(); /* AUTH */ function showAuth(){ document.getElementById('app').innerHTML = <div class="center"> <div class="auth-box"> <h2>Welcome</h2> <button class="primary" onclick="showLogin()">Login</button><br><br> <button class="success" onclick="showSignup()">Signup</button> </div> </div>; } function showLogin(){ document.getElementById('app').innerHTML = <div class="center"> <div class="auth-box"> <h2>Login</h2> <input id="email" placeholder="Email"> <input id="password" type="password" placeholder="Password"> <button class="primary" onclick="login()">Login</button> </div> </div>; } function showSignup(){ document.getElementById('app').innerHTML = <div class="center"> <div class="auth-box"> <h2>Signup</h2> <input id="email" placeholder="Email"> <input id="password" type="password" placeholder="Password"> <button class="success" onclick="signup()">Signup</button> </div> </div>; } function signup(){ localStorage.setItem("userEmail", email.value); localStorage.setItem("userPassword", password.value); showDetails(); } function login(){ if(email.value === localStorage.getItem("userEmail") && password.value === localStorage.getItem("userPassword")){ showProducts(); } else { alert("Invalid credentials"); } } /* USER DETAILS */ function showDetails(){ document.getElementById('app').innerHTML = <div class="center"> <div class="auth-box"> <h2>User Details</h2> <input id="name" placeholder="Name"> <input id="phone" placeholder="Phone"> <input id="address" placeholder="Address"> <button class="success" onclick="saveDetails()">Continue</button> </div> </div>; } function saveDetails(){ localStorage.setItem("details", JSON.stringify({ name:name.value, phone:phone.value, address:address.value })); showProducts(); } /* PRODUCTS */ function calculateTotal(){ total = 0; for(let id in cart){ total += cart[id].price * cart[id].qty; } } function showProducts(){ document.getElementById('app').innerHTML = <div class="header"> <h2>Daily Mart</h2> <div> <select id="categoryFilter" onchange="filterProducts()"> <option value="all">All</option> <option value="fruits">Fruits</option> <option value="grocery">Grocery</option> <option value="snacks">Snacks</option> <option value="spices">Spices</option> </select> <button class="danger" onclick="logout()">Logout</button> </div> </div> <div id="products"></div> <div class="cart-bar"> Total: ₹<span id="total">0</span> <button class="primary" onclick="goToCart()">View Cart</button> </div> ; fetch('/api/products') .then(res => res.json()) .then(data => { allProducts = data; renderProducts(data); }); } function filterProducts(){ let selected = document.getElementById('categoryFilter').value; let filtered = selected === "all" ? allProducts : allProducts.filter(p => p.category === selected); renderProducts(filtered); } function renderProducts(data){ let container = document.getElementById('products'); container.innerHTML = ""; data.forEach(item => { let id = item.id; let qty = cart[id] ? cart[id].qty : 0; let div = document.createElement('div'); div.className = "card"; div.innerHTML = <img src="/images/${item.image}" onerror="this.src='/images/default.jpg'"> <h3>${item.name}</h3> <p class="price">₹${item.price}</p> <div class="qty"> <button onclick="decrease('${id}')">-</button> <span id="qty-${id}">${qty}</span> <button onclick="increase('${id}','${item.name}',${item.price})">+</button> </div> ; container.appendChild(div); }); calculateTotal(); document.getElementById('total').innerText = total; } /* CART */ function increase(id,name,price){ if(!cart[id]) cart[id] = {name,price,qty:0}; cart[id].qty++; calculateTotal(); document.getElementById(qty-${id}).innerText = cart[id].qty; document.getElementById('total').innerText = total; localStorage.setItem("cart", JSON.stringify(cart)); } function decrease(id){ if(cart[id]){ cart[id].qty--; if(cart[id].qty <= 0) delete cart[id]; calculateTotal(); document.getElementById(qty-${id}).innerText = cart[id] ? cart[id].qty : 0; document.getElementById('total').innerText = total; localStorage.setItem("cart", JSON.stringify(cart)); } } /* CART PAGE */ function goToCart(){ let total = 0; let html = <div class="header"> <h2>Cart</h2> <button class="danger" onclick="showProducts()">Back</button> </div><div style="padding:20px;">; for(let id in cart){ let item = cart[id]; let itemTotal = item.price * item.qty; total += itemTotal; html += <div style="margin:10px;"> ${item.name} (${item.qty}) = ₹${itemTotal} </div>; } html += <h2>Total: ₹${total}</h2> <button class="success" onclick="placeOrder()">Place Order</button></div>; document.getElementById('app').innerHTML = html; } /* ORDER */ function placeOrder(){ fetch('/api/order',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ cart: cart, user: JSON.parse(localStorage.getItem("details")) }) }) .then(res => res.json()) .then(data => { console.log("SERVER RESPONSE:", data); // 👈 ADD THIS if(data.error){ alert("❌ " + data.error); return; } alert("✅ Order placed! ID: " + data.orderId); localStorage.removeItem("cart"); cart = {}; showProducts(); }) .catch(err => { console.error(err); alert("❌ Order failed"); }); } function logout(){ localStorage.clear(); location.reload(); } </script> </body> </html>
