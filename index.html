<!DOCTYPE html>
<html>
<head>
<title>Ecommerce World</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f1f3f6; }

/* HEADER */
.header {
    background:#2874f0;
    color:white;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* ✅ PERFECT GRID */
#products {
    display:grid;
    grid-template-columns:repeat(auto-fill, 200px);
    justify-content:center;
    gap:20px;
    padding:20px;
}

/* ✅ CARD */
.card {
    width:200px;
    height:280px; /* 🔥 fixed height */

    background:white;
    border-radius:10px;
    padding:10px;

    display:flex;
    flex-direction:column;
}

/* IMAGE */
.image-box {
    width:100%;
    height:120px;
    overflow:hidden;
    border-radius:8px;
}

.image-box img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENT */
.card-content {
    text-align:center;
}

/* TEXT */
.card h3 {
    font-size:14px;
    margin:5px 0;
}

.price {
    color:green;
    font-weight:bold;
    margin:0;
}

/* ✅ QTY ALWAYS VISIBLE */
.qty {
    margin-top:auto;
    display:flex;
    justify-content:center;
    gap:10px;
}

.qty button {
    background:#2874f0;
    color:white;
    width:28px;
    height:28px;
    border:none;
    border-radius:5px;
}

/* CART BAR */
.cart-bar {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    text-align:center;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let total = 0;

showProducts();

/* PRODUCTS */

function calculateTotal(){
    total = 0;
    for(let id in cart){
        total += cart[id].price * cart[id].qty;
    }
}

function showProducts(){

    document.getElementById('app').innerHTML = `
        <div class="header">
            <h2>Ecommerce World</h2>
        </div>

        <div id="products"></div>

        <div class="cart-bar">
            Total: ₹<span id="total">0</span>
            <button onclick="goToCart()">View Cart</button>
        </div>
    `;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {

        let container = document.getElementById('products');

        data.forEach(item => {

            let id = item.id;
            let name = item.name;
            let price = item.price;

            let qty = cart[id] ? cart[id].qty : 0;
            let image = "/images/" + name.toLowerCase() + ".jpg";

            let div = document.createElement('div');
            div.className = "card";

            div.innerHTML = `
                <div class="image-box">
                    <img src="${image}" onerror="this.src='/images/default.jpg'">
                </div>

                <div class="card-content">
                    <h3>${name}</h3>
                    <p class="price">₹${price}</p>
                </div>

                <div class="qty">
                    <button onclick="decrease('${id}')">-</button>
                    <span>${qty}</span>
                    <button onclick="increase('${id}','${name}',${price})">+</button>
                </div>
            `;

            container.appendChild(div);
        });

        calculateTotal();
        document.getElementById('total').innerText = total;
    });
}

/* CART */

function increase(id,name,price){
    if(!cart[id]) cart[id] = {name,price,qty:0};
    cart[id].qty++;
    localStorage.setItem("cart", JSON.stringify(cart));
    showProducts();
}

function decrease(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty <= 0) delete cart[id];
        localStorage.setItem("cart", JSON.stringify(cart));
        showProducts();
    }
}

/* CART PAGE */

function goToCart(){

    let total = 0;
    let bill = "";

    for(let id in cart){
        let item = cart[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        bill += `${item.name} (${item.qty}) = ₹${itemTotal}<br>`;
    }

    document.getElementById('app').innerHTML = `
        <div class="header">
            <h2>Cart</h2>
            <button onclick="showProducts()">Back</button>
        </div>

        <div style="padding:20px;">
            ${bill}
            <hr>
            <h3>Total Amount = ₹${total}</h3>
            <hr>
            <button onclick="placeOrder()">Place Order</button>
        </div>
    `;
}

/* ORDER */

function placeOrder(){
    alert("✅ Order placed successfully!");
    cart = {};
    localStorage.removeItem("cart");
    showProducts();
}

</script>
</body>
</html>
