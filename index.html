<!DOCTYPE html>
<html>
<head>
<title>My Store</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f1f3f6;
}

/* AUTH UI */
.center {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg, #2874f0, #6dd5fa);
}

.auth-box {
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    text-align:center;
}

input {
    padding:10px;
    margin:8px;
    width:90%;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.primary { background:#2874f0; color:white; width:100%; }
.success { background:green; color:white; width:100%; }
.danger { background:red; color:white; }

/* HEADER */
.header {
    background:#2874f0;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* PRODUCTS */
#products {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
    height:160px;
    object-fit:cover;
}

.price {
    color:green;
    font-weight:bold;
}

/* CART BAR */
.cart-bar {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:15px;
    text-align:center;
    box-shadow:0 -2px 5px rgba(0,0,0,0.2);
}

/* CART PAGE */
.cart-page {
    padding:20px;
}

.cart-item {
    background:white;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
let cart = {};
let total = 0;

/* LOAD */
if(!localStorage.getItem("user")){
    showAuth();
} else {
    showProducts();
}

/* ---------------- AUTH ---------------- */

function showAuth(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Welcome 🛒</h2>
            <button class="primary" onclick="showLogin()">Login</button>
            <br><br>
            <button class="success" onclick="showSignup()">Signup</button>
        </div>
    </div>`;
}

function showLogin(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Login</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="primary" onclick="login()">Login</button>
            <p>New user? <a onclick="showSignup()">Signup</a></p>
        </div>
    </div>`;
}

function showSignup(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Signup</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="success" onclick="signup()">Signup</button>
        </div>
    </div>`;
}

function login(){
    localStorage.setItem("user","login");
    showProducts();
}

function signup(){
    localStorage.setItem("user","signup");
    showDetails();
}

/* ---------------- DETAILS ---------------- */

function showDetails(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>User Details</h2>
            <input id="name" placeholder="Name">
            <input id="phone" placeholder="Phone">
            <input id="address" placeholder="Address">
            <button class="success" onclick="saveDetails()">Continue</button>
        </div>
    </div>`;
}

function saveDetails(){
    const details = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value
    };

    localStorage.setItem("details", JSON.stringify(details));
    showProducts();
}

/* ---------------- PRODUCTS ---------------- */

function showProducts(){
    document.getElementById('app').innerHTML = `
        <div class="header">
            <h2>🛒 My Store</h2>
            <button class="danger" onclick="logout()">Logout</button>
        </div>

        <div id="products"></div>

        <div class="cart-bar">
            Total: ₹<span id="total">0</span>
            <button class="primary" onclick="goToCart()">View Cart</button>
        </div>
    `;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById('products');

        data.forEach(item => {

            const p = JSON.parse(item.id);

            const name = p.name || "No Name";
            const price = p.price || 0;

            let image = p.image;
            if(!image){
                image = `https://via.placeholder.com/200?text=${name}`;
            }

            const div = document.createElement('div');
            div.className = 'card';

            div.innerHTML = `
                <img src="${image}" onerror="this.src='https://via.placeholder.com/200?text=Image'">
                <h3>${name}</h3>
                <p class="price">₹${price}</p>
                <button class="success" onclick="add('${p.id}','${name}',${price})">Add to Cart</button>
            `;

            container.appendChild(div);
        });
    });
}

function add(id,name,price){
    if(cart[id]){
        cart[id].qty++;
    } else {
        cart[id] = {name,price,qty:1};
    }

    total += price;
    document.getElementById('total').innerText = total;

    localStorage.setItem("cart", JSON.stringify(cart));
}

/* ---------------- CART ---------------- */

function goToCart(){

    let cartData = JSON.parse(localStorage.getItem("cart")) || {};
    let total = 0;

    let html = `
        <div class="header">
            <h2>🛒 Cart</h2>
            <button class="danger" onclick="showProducts()">Back</button>
        </div>

        <div class="cart-page">
    `;

    for(let id in cartData){
        let item = cartData[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        html += `
            <div class="cart-item">
                ${item.name} (${item.qty}) = ₹${itemTotal}
            </div>
        `;
    }

    html += `
        <h2>Total: ₹${total}</h2>
        <button class="success" onclick="placeOrder()">Place Order</button>
        </div>
    `;

    document.getElementById('app').innerHTML = html;
}

function placeOrder(){
    let cartData = JSON.parse(localStorage.getItem("cart"));

    fetch('/api/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({cart:cartData})
    }).then(()=>{
        alert("✅ Order Placed!");
        localStorage.removeItem("cart");
        showProducts();
    });
}

/* ---------------- LOGOUT ---------------- */

function logout(){
    localStorage.clear();
    location.reload();
}
</script>

</body>
</html>
