<!DOCTYPE html>
<html>
<head>
<title>Daily Mart</title>

<style>
body { font-family: Arial; margin:0; background:#f1f3f6; padding-bottom:80px; }

.header {
    background:#2874f0;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

#products {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    padding:10px;
    text-align:center;
    border-radius:10px;
}

.card img {
    width:100%;
    height:120px;
    object-fit:cover;
}

button {
    padding:5px 10px;
    margin:5px;
    cursor:pointer;
}

.cart-bar {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    text-align:center;
}

.bill-box {
    background:white;
    padding:20px;
    margin:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

let cart = {};
let allProducts = [];

loadProducts();

/* LOAD PRODUCTS */
function loadProducts(){
    document.getElementById('app').innerHTML = `
    <div class="header">
        <h2>Daily Mart</h2>
        <button onclick="goToCart()">Cart</button>
    </div>

    <div id="products"></div>

    <div class="cart-bar">
        Total ₹<span id="total">0</span>
    </div>
    `;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {
        allProducts = data;
        renderProducts();
    });
}

/* RENDER PRODUCTS */
function renderProducts(){

    let scrollPos = window.scrollY;

    let container = document.getElementById('products');
    container.innerHTML = "";

    allProducts.forEach(item => {

        let qty = cart[item.id] ? cart[item.id].qty : 0;

        let div = document.createElement('div');
        div.className = "card";

        div.innerHTML = `
        <img src="/images/${item.image}" onerror="this.src='/images/default.jpg'">
        <h4>${item.name}</h4>
        <p>₹${item.price}</p>

        <button onclick="decrease('${item.id}')">-</button>
        ${qty}
        <button onclick="increase('${item.id}','${item.name}',${item.price})">+</button>
        `;

        container.appendChild(div);
    });

    updateTotal();
    window.scrollTo(0, scrollPos);
}

/* CART LOGIC */
function increase(id,name,price){
    if(!cart[id]) cart[id] = {name,price,qty:0};
    cart[id].qty++;
    renderProducts();
}

function decrease(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty <= 0) delete cart[id];
    }
    renderProducts();
}

function updateTotal(){
    let total = 0;
    for(let id in cart){
        total += cart[id].price * cart[id].qty;
    }
    document.getElementById('total').innerText = total;
}

/* CART PAGE */
function goToCart(){

    let total = 0;

    let html = `
    <div class="header">
        <h2>Cart</h2>
        <button onclick="loadProducts()">Back</button>
    </div>

    <div class="bill-box">
    `;

    for(let id in cart){
        let item = cart[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        html += `<div>${item.name} (${item.qty}) = ₹${itemTotal}</div>`;
    }

    html += `
    <hr>
    <h3>Total = ₹${total}</h3>
    <hr>

    <button onclick="placeOrder()">Place Order</button>
    </div>
    `;

    document.getElementById('app').innerHTML = html;
}

/* PLACE ORDER */
function placeOrder(){

    fetch('/api/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ cart })
    })
    .then(res => res.json())
    .then(data => {

        if(data.error){
            alert("❌ " + data.error);
            return;
        }

        alert("✅ Order placed successfully!");

        showBill();

    })
    .catch(()=>{
        alert("❌ Order failed");
    });
}

/* BILL */
function showBill(){

    let total = 0;
    let bill = "Product   Qty   Price\n\n";

    for(let id in cart){
        let item = cart[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        bill += `${item.name}   ${item.qty}   ${itemTotal}\n`;
    }

    bill += "----------------------\n";
    bill += "Total = ₹" + total;

    let download = confirm("🧾 Bill Ready!\nDownload?");

    if(download){
        let blob = new Blob([bill], {type:"text/plain"});
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "bill.txt";
        link.click();
    }

    cart = {};
    loadProducts();
}

</script>

</body>
</html>
