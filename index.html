<!DOCTYPE html>
<html>
<head>
<title>Daily Mart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF LIBRARY (NO INSTALL) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f1f3f6;
    padding-bottom:80px;
}

.header {
    background:#2874f0;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

#products {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img {
    width:100%;
    height:150px;
    object-fit:contain; /* FIXED */
    background:white;
}

button {
    padding:6px 10px;
    margin:5px;
    cursor:pointer;
    border:none;
    background:#2874f0;
    color:white;
    border-radius:5px;
}

.cart-bar {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    text-align:center;
    box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}

.bill-box {
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

let cart = {};
let allProducts = [];

loadProducts();

/* LOAD PRODUCTS */
function loadProducts(){
    document.getElementById('app').innerHTML = `
    <div class="header">
        <h2>Daily Mart</h2>
        <button onclick="goToCart()">Cart</button>
    </div>

    <div id="products"></div>

    <div class="cart-bar">
        Total ₹<span id="total">0</span>
    </div>
    `;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {
        allProducts = data;
        renderProducts();
    });
}

/* RENDER */
function renderProducts(){

    let scroll = window.scrollY;

    let container = document.getElementById('products');
    container.innerHTML = "";

    allProducts.forEach(item => {

        let qty = cart[item.id] ? cart[item.id].qty : 0;

        let div = document.createElement('div');
        div.className = "card";

        div.innerHTML = `
            <img src="/images/${item.image}" onerror="this.src='/images/default.jpg'">
            <h4>${item.name}</h4>
            <p>₹${item.price}</p>

            <button onclick="decrease('${item.id}')">-</button>
            ${qty}
            <button onclick="increase('${item.id}','${item.name}',${item.price})">+</button>
        `;

        container.appendChild(div);
    });

    updateTotal();
    window.scrollTo(0, scroll);
}

/* CART */
function increase(id,name,price){
    if(!cart[id]) cart[id] = {name,price,qty:0};
    cart[id].qty++;
    renderProducts();
}

function decrease(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty <= 0) delete cart[id];
    }
    renderProducts();
}

function updateTotal(){
    let total = 0;
    for(let id in cart){
        total += cart[id].price * cart[id].qty;
    }
    document.getElementById('total').innerText = total;
}

/* CART PAGE */
function goToCart(){

    let total = 0;

    let html = `
    <div class="header">
        <h2>Cart</h2>
        <button onclick="loadProducts()">Back</button>
    </div>

    <div class="bill-box">
    `;

    for(let id in cart){
        let item = cart[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        html += `<div>${item.name} (${item.qty}) = ₹${itemTotal}</div>`;
    }

    html += `
    <hr>
    <h3>Total = ₹${total}</h3>
    <hr>
    <button onclick="placeOrder()">Place Order</button>
    </div>
    `;

    document.getElementById('app').innerHTML = html;
}

/* ORDER */
function placeOrder(){

    fetch('/api/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ cart })
    })
    .then(res => res.json())
    .then(data => {

        if(data.error){
            alert("❌ " + data.error);
            return;
        }

        alert("✅ Order placed successfully!");

        generatePDF();

    })
    .catch(()=>{
        alert("❌ Order failed");
    });
}

/* PDF BILL */
function generatePDF(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;
    let total = 0;

    doc.setFontSize(16);
    doc.text("Daily Mart Bill", 80, 10);

    doc.setFontSize(12);

    doc.text("Product", 20, y);
    doc.text("Qty", 100, y);
    doc.text("Price", 140, y);

    y += 10;
    doc.line(20, y, 180, y);
    y += 10;

    for(let id in cart){
        let item = cart[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        doc.text(item.name, 20, y);
        doc.text(String(item.qty), 100, y);
        doc.text("₹" + itemTotal, 140, y);

        y += 10;
    }

    y += 5;
    doc.line(20, y, 180, y);
    y += 10;

    doc.setFontSize(14);
    doc.text("Total: ₹" + total, 20, y);

    let confirmDownload = confirm("🧾 Bill Ready!\nDownload PDF?");

    if(confirmDownload){
        doc.save("bill.pdf");
    }

    cart = {};
    loadProducts();
}

</script>

</body>
</html>
