<!DOCTYPE html>
<html>
<head>
<title>Ecommerce World</title>
<style>
body { font-family: Arial; margin:0; background:#f1f3f6; }
.center { display:flex; justify-content:center; align-items:center; height:100vh; background: linear-gradient(135deg,#2874f0,#6dd5fa); }
.auth-box { background:white; padding:30px; border-radius:10px; width:300px; text-align:center; }
input { padding:10px; margin:8px; width:90%; }
button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }
.primary { background:#2874f0; color:white; width:100%; }
.success { background:green; color:white; width:100%; }
.danger { background:red; color:white; }
.header { background:#2874f0; color:white; padding:15px; display:flex; justify-content:space-between; }
#products { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; text-align:center; }
.price { color:green; font-weight:bold; }
.qty { display:flex; justify-content:center; gap:10px; }
.cart-bar { position:fixed; bottom:0; width:100%; background:white; padding:10px; text-align:center; }
</style>
</head>

<body>
<div id="app"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let total = 0;

showAuth();

/* AUTH */
function showAuth(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Ecommerce World</h2>
            <button class="primary" onclick="showLogin()">Login</button><br><br>
            <button class="success" onclick="showSignup()">Signup</button>
        </div>
    </div>`;
}

function showLogin(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Ecommerce World - Login</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="primary" onclick="login()">Login</button>
        </div>
    </div>`;
}

function showSignup(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Ecommerce World - Signup</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="success" onclick="signup()">Signup</button>
        </div>
    </div>`;
}

function signup(){
    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    localStorage.setItem("userEmail", email);
    localStorage.setItem("userPassword", password);

    showDetails();
}

function login(){
    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();

    if(email === localStorage.getItem("userEmail") &&
       password === localStorage.getItem("userPassword")){
        showProducts();
    } else {
        alert("Invalid credentials");
    }
}

/* DETAILS */
function showDetails(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Enter Details</h2>
            <input id="name" placeholder="Name">
            <input id="phone" placeholder="Phone">
            <input id="address" placeholder="Address">
            <button class="success" onclick="saveDetails()">Continue</button>
        </div>
    </div>`;
}

function saveDetails(){
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();

    localStorage.setItem("details", JSON.stringify({name,phone,address}));
    showProducts();
}

/* PRODUCTS */
function showProducts(){

    document.getElementById('app').innerHTML = `
    <div class="header">
        <h2>Ecommerce World</h2>
        <button class="danger" onclick="logout()">Logout</button>
    </div>
    <div id="products"></div>
    <div class="cart-bar">
        Total: ₹<span id="total">0</span>
        <button onclick="goToCart()">View Cart</button>
    </div>`;

    fetch('/api/products')
    .then(res=>res.json())
    .then(data=>{
        let container = document.getElementById('products');

        data.forEach(p=>{
            let qty = cart[p.id] ? cart[p.id].qty : 0;

            let div = document.createElement('div');
            div.className="card";

            div.innerHTML=`
                <h3>${p.name}</h3>
                <p class="price">₹${p.price}</p>
                <div class="qty">
                    <button onclick="decrease('${p.id}')">-</button>
                    <span id="qty-${p.id}">${qty}</span>
                    <button onclick="increase('${p.id}','${p.name}',${p.price})">+</button>
                </div>`;

            container.appendChild(div);
        });

        updateTotal();
    });
}

function increase(id,name,price){
    if(!cart[id]) cart[id]={name,price,qty:0};
    cart[id].qty++;
    updateTotal();
}

function decrease(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty<=0) delete cart[id];
        updateTotal();
    }
}

function updateTotal(){
    total=0;
    for(let id in cart){
        total+=cart[id].price*cart[id].qty;
    }
    document.getElementById('total').innerText=total;
    localStorage.setItem("cart",JSON.stringify(cart));
}

/* CART */
function goToCart(){
    let html=`<h2>Cart</h2>`;
    for(let id in cart){
        let item=cart[id];
        html+=`${item.name} (${item.qty}) = ₹${item.price*item.qty}<br>`;
    }
    html+=`<br>Total: ₹${total}<br><button onclick="placeOrder()">Place Order</button>`;
    document.getElementById('app').innerHTML=html;
}

/* PLACE ORDER */
function placeOrder(){

    const details = JSON.parse(localStorage.getItem("details")) || {};
    const phone = details.phone;

    fetch('/api/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({cart,phone})
    })
    .then(res=>res.json())
    .then(data=>{
        alert("Order placed!");
        window.location.href = data.whatsappUrl;
        localStorage.removeItem("cart");
    });
}

function logout(){
    localStorage.clear();
    location.reload();
}

</script>
</body>
</html>
