<!DOCTYPE html>
<html>
<head>
<title>Daily Mart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f1f3f6; }

/* AUTH */
.center {
    display:flex; justify-content:center; align-items:center;
    height:100vh; background:linear-gradient(135deg,#2874f0,#6dd5fa);
}

.auth-box {
    background:white; padding:30px; border-radius:10px;
    width:320px; text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input {
    padding:10px; margin:8px; width:90%;
    border:1px solid #ccc; border-radius:5px;
}

button {
    padding:10px; border:none; border-radius:5px;
    cursor:pointer; margin-top:10px;
}

.primary { background:#2874f0; color:white; width:100%; }
.success { background:green; color:white; width:100%; }
.danger { background:red; color:white; }

/* HEADER */
.header {
    background:#2874f0; color:white;
    padding:15px; display:flex;
    justify-content:space-between; align-items:center;
}

/* PRODUCTS */
#products {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px; padding:20px;
}

.card {
    background:white; padding:15px;
    border-radius:10px; text-align:center;
}

.card img {
    width:100%; height:160px;
    object-fit:cover;
}

.price { color:green; font-weight:bold; }

/* QTY */
.qty {
    display:flex; justify-content:center;
    gap:10px; margin-top:10px;
}

.qty button {
    background:#2874f0; color:white;
}

/* CART BAR */
.cart-bar {
    position:fixed; bottom:0;
    width:100%; background:white;
    padding:15px; text-align:center;
}

.cart-btn {
    background:#ff9800;
    color:white;
}

/* CART TABLE */
.table-row {
    display:flex;
    justify-content:space-between;
    padding:8px 0;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let allProducts = [];
let total = 0;

showAuth();

/* AUTH */

function showAuth(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Daily Mart</h2>
            <button class="primary" onclick="showLogin()">Login</button>
            <button class="success" onclick="showSignup()">Signup</button>
        </div>
    </div>`;
}

function showSignup(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Signup</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="success" onclick="signup()">Signup</button>
        </div>
    </div>`;
}

function signup(){
    let emailVal = document.getElementById("email").value.trim();
    let passVal = document.getElementById("password").value.trim();

    if(!emailVal || !passVal){
        alert("Fill all fields");
        return;
    }

    localStorage.setItem("userEmail", emailVal);
    localStorage.setItem("userPassword", passVal);

    showDetails();
}

function showDetails(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Details</h2>
            <input id="name" placeholder="Name">
            <input id="phone" placeholder="Phone">
            <input id="address" placeholder="Address">
            <button class="success" onclick="saveDetails()">Continue</button>
        </div>
    </div>`;
}

function saveDetails(){
    let nameVal = document.getElementById("name").value.trim();
    let phoneVal = document.getElementById("phone").value.trim();
    let addressVal = document.getElementById("address").value.trim();

    if(!nameVal || !phoneVal || !addressVal){
        alert("Fill all details");
        return;
    }

    localStorage.setItem("details", JSON.stringify({
        name:nameVal,
        phone:phoneVal,
        address:addressVal
    }));

    showProducts();
}

function showLogin(){
    document.getElementById('app').innerHTML = `
    <div class="center">
        <div class="auth-box">
            <h2>Login</h2>
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button class="primary" onclick="login()">Login</button>
        </div>
    </div>`;
}

function login(){
    let emailVal = document.getElementById("email").value.trim();
    let passVal = document.getElementById("password").value.trim();

    if(
        emailVal === localStorage.getItem("userEmail") &&
        passVal === localStorage.getItem("userPassword")
    ){
        showProducts();
    } else {
        alert("Invalid login");
    }
}

/* PRODUCTS */

function showProducts(){
    document.getElementById('app').innerHTML = `
    <div class="header">
        <h2>Daily Mart</h2>
        <button class="danger" onclick="logout()">Logout</button>
    </div>

    <div id="products"></div>

    <div class="cart-bar">
        Total: ₹<span id="total">0</span>
        <button class="cart-btn" onclick="goToCart()">View Cart</button>
    </div>`;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {
        allProducts = data;
        renderProducts(data);
    });
}

function renderProducts(data){
    let container = document.getElementById('products');
    container.innerHTML = "";

    data.forEach(item => {
        let id = item.id;
        let qty = cart[id]?.qty || 0;

        let div = document.createElement('div');
        div.className = "card";

        div.innerHTML = `
        <img src="/images/${item.image}">
        <h3>${item.name}</h3>
        <p class="price">₹${item.price}</p>

        <div class="qty">
            <button onclick="decrease('${id}')">-</button>
            <span id="q-${id}">${qty}</span>
            <button onclick="increase('${id}','${item.name}',${item.price})">+</button>
        </div>`;

        container.appendChild(div);
    });

    updateTotal();
}

/* CART */

function increase(id,name,price){
    if(!cart[id]) cart[id] = {name,price,qty:0};
    cart[id].qty++;
    localStorage.setItem("cart", JSON.stringify(cart));
    updateTotal();
    document.getElementById(`q-${id}`).innerText = cart[id].qty;
}

function decrease(id){
    if(cart[id]){
        cart[id].qty--;
        if(cart[id].qty<=0) delete cart[id];
        localStorage.setItem("cart", JSON.stringify(cart));
        updateTotal();
        document.getElementById(`q-${id}`).innerText = cart[id]?.qty || 0;
    }
}

function updateTotal(){
    total = 0;
    for(let i in cart){
        total += cart[i].price * cart[i].qty;
    }
    document.getElementById('total').innerText = total;
}

/* CART PAGE */

function goToCart(){
    let html = `
    <div class="header">
        <h2>Cart</h2>
        <button onclick="showProducts()">Back</button>
    </div>
    <div style="padding:20px">`;

    let total = 0;

    for(let id in cart){
        let item = cart[id];
        let t = item.price * item.qty;
        total += t;

        html += `<div class="table-row">
            <span>${item.name}</span>
            <span>${item.qty}</span>
            <span>₹${t}</span>
        </div>`;
    }

    html += `
    <hr>
    <h3>Total = ₹${total}</h3>
    <button class="success" onclick="placeOrder()">Place Order</button>
    </div>`;

    document.getElementById('app').innerHTML = html;
}

/* ORDER */

function placeOrder(){
    fetch('/api/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            cart: cart,
            user: JSON.parse(localStorage.getItem("details"))
        })
    })
    .then(res => res.json())
    .then(() => {

        alert("✅ Order placed!");

        showBill();

        localStorage.removeItem("cart");
        cart = {};
    })
    .catch(()=> alert("❌ Order failed"));
}

/* BILL */

function showBill(){
    let total=0;
    let text="Product   Qty   Price\n\n";

    for(let id in cart){
        let i=cart[id];
        let t=i.price*i.qty;
        total+=t;
        text += `${i.name}   ${i.qty}   ${t}\n`;
    }

    text += "\n-------------------\n";
    text += "Total = ₹"+total;

    let blob = new Blob([text], {type:"application/pdf"});
    let url = URL.createObjectURL(blob);

    if(confirm("Download bill?")){
        let a=document.createElement("a");
        a.href=url;
        a.download="bill.pdf";
        a.click();
    }
}

function logout(){
    localStorage.clear();
    location.reload();
}

</script>
</body>
</html>
