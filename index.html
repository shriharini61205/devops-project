<!DOCTYPE html>
<html>
<head>
<title>Ecommerce World</title>

<style>
body { font-family: Arial; margin:0; background:#f1f3f6; }

.center {
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    background: linear-gradient(135deg,#2874f0,#6dd5fa);
}

.auth-box {
    background:white; padding:30px; border-radius:10px;
    width:300px; text-align:center;
}

input { padding:10px; margin:8px; width:90%; }

button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }

.primary { background:#2874f0; color:white; width:100%; }
.success { background:green; color:white; width:100%; }
.danger { background:red; color:white; }

.header {
    background:#2874f0; color:white;
    padding:15px; display:flex; justify-content:space-between;
}

#products {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px; padding:20px;
}

.card {
    background:white; padding:15px;
    border-radius:10px; text-align:center;
}

.card img { width:100%; height:150px; object-fit:cover; }

.price { color:green; font-weight:bold; }

.qty { display:flex; justify-content:center; gap:10px; }

.cart-bar {
    position:fixed; bottom:0; width:100%;
    background:white; padding:10px; text-align:center;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let total = 0;

showProducts();

/* -------- PRODUCTS -------- */

function calculateTotal(){
    total = 0;
    for(let id in cart){
        total += cart[id].price * cart[id].qty;
    }
}

function showProducts(){

    document.getElementById('app').innerHTML = `
        <div class="header">
            <h2>Ecommerce World</h2>
            <button class="danger" onclick="logout()">Logout</button>
        </div>

        <div id="products"></div>

        <div class="cart-bar">
            Total: ₹<span id="total">0</span>
            <button class="primary" onclick="goToCart()">View Cart</button>
        </div>
    `;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {

        let container = document.getElementById('products');

        data.forEach(item => {

            let id = item.id;
            let name = item.name;
            let price = item.price;

            let qty = cart[id] ? cart[id].qty : 0;

            // ✅ FIXED IMAGE PATH
            let image = "/images/" + name.toLowerCase() + ".jpg";

            let div = document.createElement('div');
            div.className = "card";

            div.innerHTML = `
                <img src="${image}" onerror="this.src='/images/default.jpg'">
                <h3>${name}</h3>
                <p class="price">₹${price}</p>

                <div class="qty">
                    <button onclick="decrease('${id}', ${price})">-</button>
                    <span id="qty-${id}">${qty}</span>
                    <button onclick="increase('${id}','${name}',${price})">+</button>
                </div>
            `;

            container.appendChild(div);
        });

        calculateTotal();
        document.getElementById('total').innerText = total;
    });
}

/* -------- CART -------- */

function increase(id,name,price){
    if(!cart[id]) cart[id] = {name,price,qty:0};
    cart[id].qty++;
    calculateTotal();
    document.getElementById(`qty-${id}`).innerText = cart[id].qty;
    document.getElementById('total').innerText = total;
    localStorage.setItem("cart", JSON.stringify(cart));
}

function decrease(id){
    if(cart[id] && cart[id].qty > 0){
        cart[id].qty--;
        if(cart[id].qty === 0) delete cart[id];
        calculateTotal();
        document.getElementById(`qty-${id}`).innerText = cart[id] ? cart[id].qty : 0;
        document.getElementById('total').innerText = total;
        localStorage.setItem("cart", JSON.stringify(cart));
    }
}

function goToCart(){
    alert("Cart feature working 👍");
}

function logout(){
    localStorage.clear();
    location.reload();
}

</script>
</body>
</html>
