<!DOCTYPE html>
<html>
<head>
    <title>My E-commerce</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            background: #333;
            color: white;
            padding: 15px;
            margin: 0;
        }

        #products {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px;
        }

        .card {
            background: white;
            width: 200px;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .cart {
            text-align: center;
            margin: 20px;
        }

        .total {
            font-size: 20px;
            font-weight: bold;
        }

        .order-btn {
            background: #007bff;
            padding: 10px 20px;
        }

        .order-btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<h1>🛒 My E-commerce Store</h1>

<div id="products"></div>

<div class="cart">
    <p class="total">Total: ₹<span id="total">0</span></p>
    <button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
let total = 0;
let cart = [];

fetch('/api/products')
.then(res => res.json())
.then(data => {
    const container = document.getElementById('products');

    data.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <h3>${p.name}</h3>
            <p class="price">₹${p.price}</p>
            <button onclick="addToCart('${p.id}', ${p.price})">Add to Cart</button>
        `;

        container.appendChild(div);
    });
});

function addToCart(id, price) {
    total += price;
    cart.push({id, price});
    document.getElementById('total').innerText = total;
}

function placeOrder() {
    fetch('/api/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart, total })
    })
    .then(() => {
        alert("✅ Order Placed Successfully!");
        total = 0;
        cart = [];
        document.getElementById('total').innerText = 0;
    });
}
</script>

</body>
</html>
