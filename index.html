<!DOCTYPE html>
<html>
<head>
    <title>Welcome to E-commerce World</title>

    <style>
        body { font-family: Arial; margin:0; background:#f1f3f6; }

        .center { text-align:center; margin-top:50px; }

        input { padding:8px; margin:5px; width:200px; }

        button {
            padding:10px;
            margin:5px;
            border:none;
            cursor:pointer;
            border-radius:5px;
        }

        .header {
            background:#2874f0;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
        }

        .logout { background:red; color:white; }

        #products {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
            gap:20px;
            padding:20px;
        }

        .card {
            background:white;
            padding:15px;
            text-align:center;
            border-radius:8px;
        }

        .card img {
            width:100%;
            height:150px;
            object-fit:cover;
        }

        .cart {
            position:fixed;
            bottom:0;
            width:100%;
            background:white;
            padding:10px;
            text-align:center;
        }
    </style>
</head>

<body>

<div id="app"></div>

<script>
let cart = {};
let total = 0;

// MAIN LOAD
if(!localStorage.getItem("user")){
    showAuthChoice();
} else {
    showProducts();
}

// ---------------- AUTH ----------------

function showAuthChoice(){
    document.getElementById('app').innerHTML = `
        <div class="center">
            <h2>Welcome</h2>
            <button onclick="showLogin()">Login</button>
            <button onclick="showSignup()">Signup</button>
        </div>
    `;
}

function showLogin(){
    document.getElementById('app').innerHTML = `
        <div class="center">
            <h2>Login</h2>
            <input id="email" placeholder="Email"><br>
            <input id="password" type="password" placeholder="Password"><br>
            <button onclick="login()">Login</button>
        </div>
    `;
}

function showSignup(){
    document.getElementById('app').innerHTML = `
        <div class="center">
            <h2>Signup</h2>
            <input id="email" placeholder="Email"><br>
            <input id="password" type="password" placeholder="Password"><br>
            <button onclick="signup()">Signup</button>
        </div>
    `;
}

function login(){
    localStorage.setItem("user", "logged");
    showProducts();
}

function signup(){
    localStorage.setItem("user", "new");
    showDetails();
}

// ---------------- DETAILS ----------------

function showDetails(){
    document.getElementById('app').innerHTML = `
        <div class="center">
            <h2>Enter Details</h2>
            <input id="name" placeholder="Name"><br>
            <input id="phone" placeholder="Phone"><br>
            <input id="address" placeholder="Address"><br>
            <button onclick="saveDetails()">Continue</button>
        </div>
    `;
}

function saveDetails(){
    const details = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value
    };

    localStorage.setItem("details", JSON.stringify(details));
    showProducts();
}

// ---------------- PRODUCTS ----------------

function showProducts(){
    document.getElementById('app').innerHTML = `
        <div class="header">
            <h2>🛒 My Store</h2>
            <button class="logout" onclick="logout()">Logout</button>
        </div>

        <div id="products"></div>

        <div class="cart">
            Total: ₹<span id="total">0</span>
            <button onclick="goToCart()">Cart</button>
        </div>
    `;

    fetch('/api/products')
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById('products');

        data.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card';

            div.innerHTML = `
                <img src="${p.image}">
                <h3>${p.name}</h3>
                <p>₹${p.price}</p>
                <button onclick="add('${p.id}','${p.name}',${p.price})">Add</button>
            `;

            container.appendChild(div);
        });
    });
}

function add(id,name,price){
    if(cart[id]){
        cart[id].qty++;
    } else {
        cart[id] = {name, price, qty:1};
    }

    total += price;
    document.getElementById('total').innerText = total;

    localStorage.setItem("cart", JSON.stringify(cart));
}

// ---------------- CART ----------------

function goToCart(){
    let cartData = JSON.parse(localStorage.getItem("cart")) || {};
    let total = 0;
    let html = `<h2>🛒 Cart</h2>`;

    for(let id in cartData){
        let item = cartData[id];
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        html += `<p>${item.name} (${item.qty}) = ₹${itemTotal}</p>`;
    }

    html += `<hr>Total = ₹${total}<br>
             <button onclick="placeOrder()">Place Order</button>`;

    document.getElementById('app').innerHTML = html;
}

function placeOrder(){
    let cartData = JSON.parse(localStorage.getItem("cart"));

    fetch('/api/order',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({cart:cartData})
    }).then(()=>{
        alert("Order placed!");
        localStorage.removeItem("cart");
        showProducts();
    });
}

// ---------------- LOGOUT ----------------

function logout(){
    localStorage.clear();
    location.reload();
}
</script>

</body>
</html>
